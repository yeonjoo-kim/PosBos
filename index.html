<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piece or Background</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400&family=Dosis:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #E2FFDA;
            --outline-color: #D9D9D9;
            --sub-color: #D7FFF9;
            --text-main: #222222;
            --text-sub: #777777;
            --border-width: 2pt;
        }
        body { background-color: var(--bg-color); font-family: 'Dosis', 'Dongle', sans-serif; color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 40px; }
        .main-logo { width: 120px; height: auto; position: fixed; top: 40px; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 2; }
        .envelope-graphic { width: 100%; height: auto; stroke: var(--outline-color); stroke-width: var(--border-width); fill: var(--bg-color); position: relative; z-index: 1; }
        #step-code, #step-message, #step-waiting, #step-result { position: relative; z-index: 3; }
        .hidden { display: none !important; }
        input, textarea, button { width: 100%; padding: 16px; border: var(--border-width) solid var(--outline-color); font-family: inherit; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: var(--outline-color); }
    </style>
</head>
<body>

    <div class="container">
        <img src="./logo.png?v=2" alt="Piece or Background Logo" class="main-logo">
        
        <svg class="envelope-graphic" viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="396" height="236" />
            <polyline points="2,2 200,140 398,2" fill="none" />
            <polyline points="2,238 150,110" fill="none" />
            <polyline points="398,238 250,110" fill="none" />
        </svg>

        <div id="step-code">
            <input type="text" id="input-code" placeholder="Alphabet & Number Code" autocomplete="off">
            <button onclick="goToNextStep()">Next</button>
        </div>

        <div id="step-message" class="hidden">
            <textarea id="input-message" rows="4" placeholder="Your message..."></textarea>
            <input type="email" id="input-email" placeholder="Email address">
            <label><input type="checkbox" id="check-share-email"> Share email?</label>
            <button onclick="submitData()">Submit</button>
        </div>

        <div id="step-waiting" class="hidden">
            <p>짝꿍의 메시지를 기다리는 중입니다...</p>
        </div>

        <div id="step-result" class="hidden">
            <div id="partner-message-display"></div>
        </div>
    </div>

    <script>
        const webhookUrl = 'https://hook.eu1.make.com/k2hksgex8bb82cv7gi3h0klman1n7dt1';

        // 서버 전송 함수 (통신 오류 방지용 수정)
        function submitData() {
            const data = {
                code: document.getElementById('input-code').value,
                message: document.getElementById('input-message').value,
                email: document.getElementById('input-email').value,
                shareEmail: document.getElementById('check-share-email').checked
            };

            // 1. 제출 즉시 화면 전환 (응답 기다리지 않음)
            document.getElementById('step-message').classList.add('hidden');
            document.getElementById('step-waiting').classList.remove('hidden');

            // 2. 서버로 전송만 함
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => console.log("전송 완료"))
            .catch(err => console.error("전송 에러:", err));
        }

        // 이후 결과는 어떻게 받나요? 
        // 🌟 제안: 웹사이트에서 주기적으로 결과를 확인하거나(Polling), 
        // 짝꿍이 확인했을 때 메일을 보내는 현재 구조를 유지하세요.
    </script>
</body>
</html>
