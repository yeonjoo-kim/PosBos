<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piece or Background</title>
    <style>
        :root { --bg-color: #E2FFDA; --outline-color: #D9D9D9; --border-width: 2pt; }
        body { background-color: var(--bg-color); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 480px; }
        .hidden { display: none !important; }
        input, textarea, button { width: 100%; padding: 16px; border: var(--border-width) solid var(--outline-color); margin-top: 10px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="step-code">
            <p>코드를 입력하세요.</p>
            <input type="text" id="input-code" placeholder="Code">
            <button onclick="goToNextStep()">Next</button>
        </div>

        <div id="step-message" class="hidden">
            <p>메세지를 남기세요</p>
            <textarea id="input-message" rows="4"></textarea>
            <input type="email" id="input-email" placeholder="Email">
            <button onclick="submitData()">Submit</button>
        </div>

        <div id="step-waiting" class="hidden">
            <p>상대방의 메세지를 기다리는 중입니다.</p>
        </div>
    </div>

    <script>
        const validCodes = ['PoS1@p&b', 'BoS1@p&b', 'PoS2@p&b', 'BoS2@p&b', 'PoS3@p&b', 'BoS3@p&b', 'PoS4@p&b', 'BoS4@p&b', 'PoS5@p&b', 'BoS5@p&b', 'PoS6@p&b', 'BoS6@p&b', 'PoS7@p&b', 'BoS7@p&b', 'PoS8@p&b', 'BoS8@p&b', 'PoS9@p&b', 'BoS9@p&b', 'PoS10@p&b', 'BoS10@p&b'];
        const webhookUrl = 'https://hook.eu1.make.com/k2hksgex8bb82cv7gi3h0klman1n7dt1';

        // 1. Next 버튼 함수
        function goToNextStep() {
            const codeInput = document.getElementById('input-code').value.trim();
            if (validCodes.includes(codeInput)) {
                document.getElementById('step-code').classList.add('hidden');
                document.getElementById('step-message').classList.remove('hidden');
            } else {
                alert("코드를 다시 확인해주세요.");
            }
        }

        // 2. Submit 버튼 함수 (통신 오류 방지용 비동기 처리)
        function submitData() {
            const data = {
                code: document.getElementById('input-code').value.trim(),
                message: document.getElementById('input-message').value.trim(),
                email: document.getElementById('input-email').value.trim()
            };

            // 즉시 화면 전환
            document.getElementById('step-message').classList.add('hidden');
            document.getElementById('step-waiting').classList.remove('hidden');

            // 응답을 기다리지 않고 전송만 수행 (통신 오류 방지)
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .catch(err => console.log("전송 시작"));
        }
    </script>
</body>
</html>
