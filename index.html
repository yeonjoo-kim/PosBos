<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piece or Background</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="apple-touch-icon" href="./favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400&family=Dosis:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* 시스템 컬러 및 타이포그래피 변수 */
        :root {
            --bg-color: #E2FFDA;
            --outline-color: #D9D9D9;
            --sub-color: #D7FFF9;
            --text-main: #222222;
            --text-sub: #777777;
            --border-width: 2pt;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Helvetica Neue', Helvetica, 'Noto Sans KR', 'Noto Sans JP', 'Noto Sans', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .main-logo {
            width: 120px;
            height: auto;
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none; 
            z-index: 2; 
        }
        
        .envelope-graphic {
            width: 100%;
            height: auto;
            stroke: var(--outline-color);
            stroke-width: var(--border-width);
            fill: var(--bg-color);
            position: relative;
            z-index: 1;
        }

        /* 🌟 스크립트에 잘못 들어가 있던 코드를 올바른 위치(CSS)로 구출했습니다! */
        #step-code, #step-message, #step-waiting, #step-result {
            position: relative;
            z-index: 3;
        }

        .instruction {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .instruction p {
            margin: 4px 0;
            line-height: 1.5;
        }
        
        body, input, textarea, button {
            font-family: 'Dosis', 'ヒラギノ丸ゴ Pro W4', 'Hiragino Maru Gothic Pro', 'Dongle', sans-serif;
        }

        .lang-kr { font-family: 'Dongle', sans-serif; font-size: 26px; font-weight: 300; line-height: 1.1; margin-bottom: -4px; }
        .lang-en { font-family: 'Dosis', sans-serif; font-size: 16px; font-weight: 400; color: var(--text-sub); }
        .lang-jp { font-family: 'ヒラギノ丸ゴ Pro W4', 'Hiragino Maru Gothic Pro', sans-serif; font-size: 11.5px; color: var(--text-sub); }

        .text-main { font-family: 'Dosis', 'ヒラギノ丸ゴ Pro W4', 'Dongle', sans-serif; }
        .text-kr { font-family: 'Dongle', sans-serif; font-size: 24px; font-weight: 300; line-height: 1.2; }
        .text-en { font-family: 'Dosis', sans-serif; font-size: 16px; font-weight: 500; }
        .text-jp { font-family: 'ヒラギノ丸ゴ Pro W4', 'Hiragino Maru Gothic Pro', sans-serif; font-size: 13px; }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 16px;
            background-color: transparent;
            border: var(--border-width) solid var(--outline-color);
            border-radius: 0;
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
            resize: none;
        }

        input[type="text"]:focus, input[type="email"]:focus, textarea:focus {
            outline: none;
            background-color: var(--sub-color);
